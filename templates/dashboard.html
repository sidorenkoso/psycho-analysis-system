<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Особистий кабінет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">PsychoAnalysis</a>
            <div class="d-flex">
                <span class="navbar-text me-3">Привіт, <strong>{{ user.username }}</strong>!</span>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Вийти</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Особистий кабінет</h2>
        <hr>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Доступні тести</h5>
                        <p class="card-text">Пройдіть діагностику для отримання детального ML-аналізу.</p>
                        <button class="btn btn-primary" disabled>Пройти тест (В розробці)</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <h4>Ваша історія результатів</h4>
                <div class="alert alert-info">Тут відображатимуться ваші результати після проходження тестів.</div>
            </div>
        </div>
    </div>
</body>
</html>
